<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Study Tracker</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7f9fc;
      --border: rgba(0,0,0,0.08);
      --text: #1a202c;
      --text2: #64748b;
      --text3: #94a3b8;
      --accent: #3b82f6;
      --accent-light: #eff6ff;
      --red: #ef4444; --red-bg: #fef2f2; --red-text: #991b1b;
      --yellow: #f59e0b; --yellow-bg: #fffbeb; --yellow-text: #92400e;
      --green: #22c55e; --green-bg: #f0fdf4; --green-text: #166534;
      --radius: 14px; --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

    /* HEADER */
    .app-header { background: var(--surface); padding: 20px 20px 0; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .app-title { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .app-title span { color: var(--accent); }
    .tabs { display: flex; }
    .tab-btn { flex: 1; padding: 11px 0; font-size: 13px; font-weight: 600; font-family: 'Nunito', sans-serif; color: var(--text2); background: none; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; transition: all 0.15s; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* CONTENT */
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* CIRCLE PROGRESS */
    .circle-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px 0 16px; }
    .circle-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }

    /* SECTION TITLE */
    .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin: 16px 0 10px; }

    /* SUBJECT CARD */
    .subject-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; box-shadow: var(--shadow); overflow: hidden; }
    .subject-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none; }
    .subject-header-main { flex: 1; min-width: 0; }
    .subject-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .subject-name { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
    .subject-meta { font-size: 12px; color: var(--text3); margin-top: 5px; display: flex; justify-content: space-between; }
    .chevron { font-size: 18px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; line-height: 1; }
    .chevron.open { transform: rotate(90deg); }

    /* BADGE */
    .badge { font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px; font-family: 'Nunito', sans-serif; }
    .badge-red { background: var(--red-bg); color: var(--red-text); }
    .badge-yellow { background: var(--yellow-bg); color: var(--yellow-text); }
    .badge-green { background: var(--green-bg); color: var(--green-text); }
    .badge-blue { background: var(--accent-light); color: #1d4ed8; }
    .badge-gray { background: #f1f5f9; color: #64748b; }

    /* PROGRESS BAR */
    .bar-bg { height: 6px; background: var(--bg); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
    .bar-red { background: var(--red); }
    .bar-yellow { background: var(--yellow); }
    .bar-green { background: var(--green); }
    .bar-blue { background: var(--accent); }
    .bar-gray { background: #cbd5e1; }

    /* CHAPTERS AREA */
    .chapters-area { border-top: 1px solid var(--border); background: var(--surface2); padding: 12px 16px 14px; display: none; }
    .chapters-area.open { display: block; }

    /* CHAPTER ROW */
    .chapter-row { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 10px 12px; margin-bottom: 8px; }
    .chapter-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .chapter-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .chapter-progress-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .chapter-progress-row .bar-bg { flex: 1; }
    .pages-input { width: 52px; padding: 4px 6px; font-size: 13px; font-weight: 600; font-family: 'Nunito', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); text-align: center; }
    .pages-input:focus { outline: none; border-color: var(--accent); }
    .pages-of { font-size: 12px; color: var(--text3); white-space: nowrap; }

    /* DELETE BTN */
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 0 0 0 6px; line-height: 1; flex-shrink: 0; }
    .del-btn:hover { color: var(--red); }

    /* ADD CHAPTER FORM */
    .add-chapter-section { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
    .add-chapter-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .add-chapter-form { display: flex; gap: 6px; flex-wrap: wrap; }
    .add-chapter-form input { padding: 7px 10px; font-size: 13px; font-family: 'Nunito Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); }
    .add-chapter-form input:focus { outline: none; border-color: var(--accent); }
    .add-chapter-form select { padding: 7px 10px; font-size: 13px; font-family: 'Nunito Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); flex: 2; min-width: 110px; }
    .add-chapter-form select:focus { outline: none; border-color: var(--accent); }
    .input-name { flex: 2; min-width: 110px; }
    .input-pages { flex: 1; min-width: 70px; }
    .btn-add-chapter { padding: 7px 14px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; border-radius: var(--radius-sm); border: none; background: var(--accent); color: white; cursor: pointer; white-space: nowrap; }
    .btn-add-chapter:active { opacity: 0.85; }

    /* ADD SUBJECT / EXAM */
    .add-card-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 13px; background: var(--surface); border: 1.5px dashed #cbd5e1; border-radius: var(--radius); color: var(--accent); font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
    .add-card-btn:hover { background: var(--accent-light); }

    /* INLINE FORM */
    .add-subject-form { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; display: none; }
    .add-subject-form.open { display: block; }
    .form-title { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 10px; font-family: 'Nunito', sans-serif; }
    .add-subject-form input { width: 100%; padding: 9px 12px; font-size: 14px; font-family: 'Nunito Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); margin-bottom: 8px; }
    .add-subject-form input:focus { outline: none; border-color: var(--accent); }
    .form-actions { display: flex; gap: 8px; }
    .btn-primary { flex: 1; padding: 9px; font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; border-radius: var(--radius-sm); border: none; background: var(--accent); color: white; cursor: pointer; }
    .btn-cancel { padding: 9px 16px; font-size: 14px; font-weight: 600; font-family: 'Nunito', sans-serif; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; }

    /* EXAM CARD */
    .exam-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; box-shadow: var(--shadow); overflow: hidden; }
    .exam-header { padding: 14px 16px; cursor: pointer; user-select: none; }
    .exam-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .exam-name { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
    .exam-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-top: 5px; }

    /* MONTH CARD */
    .month-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; box-shadow: var(--shadow); overflow: hidden; }
    .month-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none; }
    .month-header-main { flex: 1; min-width: 0; }
    .month-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .month-name { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; color: var(--text); }
    .month-meta { font-size: 12px; color: var(--text3); margin-top: 5px; display: flex; justify-content: space-between; align-items: center; }
    .month-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; font-family: 'Nunito', sans-serif; }
    .status-current { background: #eff6ff; color: #1d4ed8; }
    .status-done { background: var(--green-bg); color: var(--green-text); }
    .status-upcoming { background: #f1f5f9; color: #64748b; }
    .status-behind { background: var(--red-bg); color: var(--red-text); }

    /* MONTH SUBJECT BLOCK */
    .month-subject-block { margin-bottom: 12px; }
    .month-subject-label { font-size: 12px; font-weight: 700; color: var(--text2); font-family: 'Nunito', sans-serif; margin-bottom: 6px; padding: 0 2px; }

    /* PLANNING: assign chapter row */
    .assign-row { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 10px 12px; margin-bottom: 6px; }
    .assign-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .assign-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .assign-progress-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .assign-progress-row .bar-bg { flex: 1; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 14px; line-height: 1.6; }
    .empty-icon { font-size: 36px; margin-bottom: 8px; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a202c; color: white; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; font-family: 'Nunito', sans-serif; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* INSTALL BANNER */
    .install-banner { background: var(--accent-light); border-bottom: 1px solid #bfdbfe; padding: 10px 16px; align-items: center; justify-content: space-between; font-size: 13px; color: #1e40af; display: none; }
    .install-banner.show { display: flex; }
    .btn-install { background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; }

    /* DEADLINE COUNTDOWN */
    .deadline-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 14px 16px; margin-bottom: 6px; }
    .deadline-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .deadline-label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); }
    .deadline-days { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; }
    .deadline-days span { font-size: 13px; font-weight: 600; color: var(--text2); margin-left: 3px; }
    .deadline-bar-bg { height: 8px; background: var(--bg); border-radius: 999px; overflow: hidden; margin-bottom: 6px; }
    .deadline-bar-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }
    .deadline-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); }
    .month-days-left { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; font-family: 'Nunito', sans-serif; white-space: nowrap; }

    /* EXPORT / IMPORT BAR */
    .data-bar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 20px; gap: 10px; }
    .data-bar-label { font-size: 12px; color: var(--text3); font-weight: 600; }
    .data-bar-btns { display: flex; gap: 8px; }
    .btn-data { padding: 5px 13px; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap; border: 1px solid var(--border); }
    .btn-export { background: var(--surface); color: var(--accent); }
    .btn-export:hover { background: var(--accent-light); }
    .btn-import { background: var(--surface); color: var(--text2); }
    .btn-import:hover { background: var(--surface2); }
    #import-file-input { display: none; }

    /* PRACTICE QUESTIONS */
    .practice-wrap { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .practice-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .practice-icon { font-size: 13px; flex-shrink: 0; width: 18px; }
    .practice-label { font-size: 11px; font-weight: 700; color: var(--text2); flex-shrink: 0; min-width: 90px; }
    .practice-bar-wrap { flex: 1; min-width: 0; }
    .pct-input { width: 48px; padding: 3px 6px; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); text-align: center; }
    .pct-input:focus { outline: none; border-color: var(--accent); }
    .bar-ncert  { background: #0ea5e9; }
    .bar-practice { background: #f97316; }
    .sub-practice-summary { font-size: 11px; color: var(--text3); margin-top: 3px; display: flex; gap: 10px; }

    /* CUSTOM PARAMS */
    .custom-params-wrap { margin-top: 6px; }
    .custom-param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .custom-param-name { font-size: 12px; font-weight: 600; color: var(--text2); min-width: 90px; flex-shrink: 0; }
    .btn-add-param { display: flex; align-items: center; gap: 4px; margin-top: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; border-radius: var(--radius-sm); border: 1px dashed var(--border); background: none; color: var(--accent); cursor: pointer; }
    .btn-add-param:hover { background: var(--accent-light); }
    .btn-del-param { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 13px; padding: 0 0 0 4px; flex-shrink: 0; }
    .btn-del-param:hover { color: var(--red); }
    .param-pct-input { width: 48px; padding: 3px 6px; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); text-align: center; flex-shrink: 0; }
    .param-pct-input:focus { outline: none; border-color: var(--accent); }
    .bar-custom { background: #8b5cf6; }

    /* CONFIDENCE RATING */
    .confidence-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .confidence-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
    .conf-btns { display: flex; gap: 6px; flex: 1; }
    .conf-btn { flex: 1; padding: 5px 4px; font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif; border-radius: var(--radius-sm); border: 1.5px solid transparent; cursor: pointer; text-align: center; transition: all 0.15s; background: var(--surface2); color: var(--text2); }
    .conf-btn:hover { transform: scale(1.04); }
    .conf-btn.active-shaky  { background: #fef2f2; color: #991b1b; border-color: #ef4444; }
    .conf-btn.active-ok     { background: #fffbeb; color: #92400e; border-color: #f59e0b; }
    .conf-btn.active-confident { background: #f0fdf4; color: #166534; border-color: #22c55e; }

    /* CHAPTER REORDER */
    .reorder-btns { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
    .btn-reorder { background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--text3); font-size: 10px; padding: 1px 5px; line-height: 1.4; }
    .btn-reorder:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
    .btn-reorder:disabled { opacity: 0.25; cursor: default; }

    /* SUBJECT EDIT */
    .subject-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .btn-edit-sub { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; color: var(--text3); font-size: 12px; padding: 2px 8px; font-family: 'Nunito', sans-serif; font-weight: 600; }
    .btn-edit-sub:hover { color: var(--accent); border-color: var(--accent); }
    .btn-del-sub { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; color: var(--text3); font-size: 13px; padding: 2px 7px; }
    .btn-del-sub:hover { color: var(--red); border-color: var(--red); }
    .edit-subject-inline { padding: 10px 16px; background: var(--surface2); border-top: 1px solid var(--border); display: none; }
    .edit-subject-inline.open { display: flex; gap: 8px; }
    .edit-subject-inline input { flex: 1; padding: 7px 10px; font-size: 13px; font-family: 'Nunito Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); }
    .edit-subject-inline input:focus { outline: none; border-color: var(--accent); }

    /* AUTOFILL */
    .autofill-bar { background: linear-gradient(135deg, #eff6ff 0%, #faf5ff 100%); border: 1px solid #e0e7ff; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .autofill-text { font-size: 13px; color: var(--text2); line-height: 1.4; }
    .autofill-text strong { color: var(--text); font-weight: 700; }
    .btn-autofill { padding: 8px 16px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; border-radius: var(--radius-sm); border: none; background: var(--accent); color: white; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .btn-autofill:hover { background: #2563eb; }
    .autofill-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .autofill-modal-bg.show { display: flex; }
    .autofill-modal { background: var(--surface); border-radius: var(--radius); padding: 20px; max-width: 400px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-title { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.5; }
    .modal-preview { background: var(--surface2); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 12px; margin-bottom: 16px; max-height: 240px; overflow-y: auto; }
    .preview-subject { margin-bottom: 10px; }
    .preview-subject-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; font-family: 'Nunito', sans-serif; }
    .preview-month-row { font-size: 12px; color: var(--text2); padding: 2px 0; display: flex; justify-content: space-between; }
    .preview-month-row span { color: var(--text3); }
    .modal-actions { display: flex; gap: 8px; }

    /* MEMORIZATION BARS */
    .bar-memo { background: #a855f7; }
    .bar-row-label { font-size: 11px; font-weight: 700; color: var(--text3); margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
    .dual-bar-wrap { margin-top: 6px; }
    .dual-bar-wrap .bar-bg { margin-bottom: 4px; }
    .memo-note { font-size: 11px; color: #a855f7; background: #faf5ff; border-radius: 6px; padding: 2px 7px; font-weight: 600; }

    /* SYLLABUS READ-ONLY NOTE */
    .readonly-note { font-size: 12px; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>

<div class="install-banner" id="installBanner">
  <span>📲 Add to home screen</span>
  <button class="btn-install" id="installBtn">Install</button>
</div>

<div class="data-bar">
  <span class="data-bar-label">💾 Your data</span>
  <div class="data-bar-btns">
    <button class="btn-data btn-export" onclick="exportData()">⬇ Export</button>
    <button class="btn-data btn-import" onclick="document.getElementById('import-file-input').click()">⬆ Import</button>
    <input type="file" id="import-file-input" accept=".json" onchange="importData(event)"/>
  </div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────
const MONTHS = [
  { key: 'apr', label: 'April',     num: 4 },
  { key: 'may', label: 'May',       num: 5 },
  { key: 'jun', label: 'June',      num: 6 },
  { key: 'jul', label: 'July',      num: 7 },
  { key: 'aug', label: 'August',    num: 8 },
  { key: 'sep', label: 'September', num: 9 },
  { key: 'oct', label: 'October',   num: 10 }
];

// ── DATA MODEL ───────────────────────────────────────────────────────────
// subjects: [{ id, name, chapters: [{ id, name, totalPages }] }]
// planning: { apr: { assignments: [{ subjectId, chapterId, plannedPages, donePages, memoPages }] }, ... }
// exams:    [{ id, name, subjects: [{ id, name, chapters: [{ id, name, totalPages, donePages }] }] }]

let data = { subjects: [], planning: {}, exams: [] };

MONTHS.forEach(m => { /* init planning slots */ });

function save() { localStorage.setItem('studytracker_v2', JSON.stringify(data)); }

function load() {
  try {
    const s = localStorage.getItem('studytracker_v2');
    if (s) data = JSON.parse(s);
  } catch(e) {}
  // ensure all months exist
  MONTHS.forEach(m => {
    if (!data.planning[m.key]) data.planning[m.key] = { assignments: [] };
  });
}

// ── HELPERS ──────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pctColor(p) { return p < 40 ? 'red' : p < 70 ? 'yellow' : 'green'; }
function calcPct(total, done) { if (!total) return 0; return Math.min(100, Math.round((done/total)*100)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── DERIVED: pages done per chapter (from planning) ───────────────────────
// Returns { chapterId: donePages } aggregated across all months
function chapterDoneMap() {
  const map = {};
  MONTHS.forEach(m => {
    (data.planning[m.key]?.assignments || []).forEach(a => {
      map[a.chapterId] = (map[a.chapterId] || 0) + (a.donePages || 0);
    });
  });
  return map;
}

// Total planned pages per chapter across all months
function chapterMemoMap() {
  const map = {};
  MONTHS.forEach(m => {
    (data.planning[m.key]?.assignments || []).forEach(a => {
      map[a.chapterId] = (map[a.chapterId] || 0) + (a.memoPages || 0);
    });
  });
  return map;
}

function chapterPlannedMap() {
  const map = {};
  MONTHS.forEach(m => {
    (data.planning[m.key]?.assignments || []).forEach(a => {
      map[a.chapterId] = (map[a.chapterId] || 0) + (a.plannedPages || 0);
    });
  });
  return map;
}

function overallSyllabusPct() {
  const doneMap = chapterDoneMap();
  let total = 0, done = 0;
  data.subjects.forEach(s => s.chapters.forEach(c => {
    total += c.totalPages || 0;
    done  += Math.min(doneMap[c.id] || 0, c.totalPages || 0);
  }));
  return calcPct(total, done);
}

// ── MONTH STATUS ──────────────────────────────────────────────────────────
function monthStatus(monthKey) {
  const now = new Date();
  const currentMonth = now.getMonth() + 1; // 1-based
  const m = MONTHS.find(x => x.key === monthKey);
  const assignments = data.planning[monthKey]?.assignments || [];
  const totalPlanned = assignments.reduce((a,x) => a + (x.plannedPages||0), 0);
  const totalDone    = assignments.reduce((a,x) => a + (x.donePages||0), 0);

  if (m.num < currentMonth) {
    // past month
    if (!totalPlanned) return { label: 'Past', cls: 'status-upcoming' };
    return totalDone >= totalPlanned
      ? { label: '✓ Done', cls: 'status-done' }
      : { label: 'Incomplete', cls: 'status-behind' };
  } else if (m.num === currentMonth) {
    return { label: 'Current', cls: 'status-current' };
  } else {
    return { label: 'Upcoming', cls: 'status-upcoming' };
  }
}

// ── DATE HELPERS ─────────────────────────────────────────────────────────
function getStudyYear() {
  // Study year runs Apr 1 to Oct 31.
  // If today is before Apr 1 of current year, use current year (cycle not started yet).
  // If today is after Oct 31, use next year.
  const now = new Date();
  const yr = now.getFullYear();
  const oct31 = new Date(yr, 9, 31, 23, 59, 59);
  if (now > oct31) return yr + 1; // past deadline, next cycle
  return yr;
}

function getDeadline() {
  return new Date(getStudyYear(), 9, 31, 23, 59, 59); // Oct 31
}

function getStartDate() {
  return new Date(getStudyYear(), 3, 1); // Apr 1
}

function totalDaysInYear() {
  // Apr 1 to Oct 31 = 214 days
  return 214;
}

function daysUntilDeadline() {
  const now = new Date();
  const start = getStartDate();
  const deadline = getDeadline();

  // Before Apr 1 — countdown not started yet, show full 214 days
  if (now < start) return totalDaysInYear();

  // After Oct 31 — deadline passed
  if (now > deadline) return 0;

  // Between Apr 1 and Oct 31 — count days remaining
  const diff = deadline - now;
  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
}

function daysElapsedSinceStart() {
  const now = new Date();
  const start = getStartDate();

  // Before Apr 1 — nothing elapsed yet, bar stays empty
  if (now < start) return 0;

  const diff = now - start;
  return Math.max(0, Math.min(totalDaysInYear(), Math.floor(diff / (1000 * 60 * 60 * 24))));
}

function daysLeftInMonth(monthNum) {
  const now = new Date();
  const curMonth = now.getMonth() + 1;
  const yr = getStudyYear();
  if (monthNum < curMonth) return 0;
  if (monthNum > curMonth) {
    return new Date(yr, monthNum, 0).getDate();
  }
  // current month: days remaining including today
  const lastDay = new Date(yr, monthNum, 0).getDate();
  return lastDay - now.getDate() + 1;
}

function renderDeadlineCard() {
  const wrap = document.getElementById('deadline-card-wrap');
  if (!wrap) return;
  const daysLeft = daysUntilDeadline();
  const elapsed = daysElapsedSinceStart();
  const total = totalDaysInYear();
  const pctTime = Math.min(100, Math.round((elapsed / total) * 100));
  const barCol = daysLeft < 30 ? '#ef4444' : daysLeft < 60 ? '#f59e0b' : '#3b82f6';
  const textCol = daysLeft < 30 ? '#991b1b' : daysLeft < 60 ? '#92400e' : '#1e40af';
  const yr = getStudyYear();
  const startDate = `Apr 1, ${yr}`;
  const endDate = `Oct 31, ${yr}`;
  wrap.innerHTML = `
    <div class="deadline-card">
      <div class="deadline-top">
        <span class="deadline-label">Days left to complete syllabus</span>
        <div class="deadline-days" style="color:${textCol}">${daysLeft}<span>days</span></div>
      </div>
      <div class="deadline-bar-bg">
        <div class="deadline-bar-fill" style="width:${pctTime}%;background:${barCol}"></div>
      </div>
      <div class="deadline-meta">
        <span>${startDate}</span>
        <span>${pctTime}% of time used</span>
        <span>${endDate}</span>
      </div>
    </div>`;
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}

// ── CARD TOGGLE ───────────────────────────────────────────────────────────
window._openCards = {};
function toggleCard(key) {
  window._openCards[key] = !window._openCards[key];
  const area = document.getElementById('chap-'+key);
  const chev = document.getElementById('chev-'+key);
  if (area) area.classList.toggle('open', window._openCards[key]);
  if (chev) chev.classList.toggle('open', window._openCards[key]);
}

// ═══════════════════════════════════════════════════════════════════════════
// SYLLABUS TAB
// ═══════════════════════════════════════════════════════════════════════════
function updateCircle() {
  const p = overallSyllabusPct();
  const circumference = 351.9;
  const offset = circumference - (p / 100) * circumference;
  const arc = document.getElementById('circle-arc');
  const pctEl = document.getElementById('circle-pct');
  const col = p < 40 ? '#ef4444' : p < 70 ? '#f59e0b' : '#22c55e';
  if (arc) { arc.style.strokeDashoffset = offset; arc.style.stroke = col; }
  if (pctEl) pctEl.textContent = p + '%';
}

function renderSyllabus() {
  updateCircle();
  renderDeadlineCard();
  const doneMap = chapterDoneMap();
  const plannedMap = chapterPlannedMap();
  const memoMap = chapterMemoMap();
  const list = document.getElementById('subjects-list');
  if (!data.subjects.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div>No subjects yet.<br>Add your first subject below.</div>';
    return;
  }
  list.innerHTML = data.subjects.map((sub, si) => {
    const key = `syl-s${si}`;
    const isOpen = window._openCards[key];
    let subTotal = 0, subDone = 0, subMemo = 0;
    let subNcertSum = 0, subPracticeSum = 0, subChapWithPractice = 0;
    sub.chapters.forEach(c => {
      subTotal += c.totalPages || 0;
      subDone  += Math.min(doneMap[c.id]||0, c.totalPages||0);
      subMemo  += Math.min(memoMap[c.id]||0, c.totalPages||0);
      if ((c.ncertPct||0) > 0 || (c.practicePct||0) > 0) subChapWithPractice++;
      subNcertSum    += (c.ncertPct||0);
      subPracticeSum += (c.practicePct||0);
    });
    const p  = calcPct(subTotal, subDone);
    const pm = calcPct(subTotal, subMemo);
    const col  = pctColor(p);
    const colm = pctColor(pm);
    const avgNcert    = sub.chapters.length ? Math.round(subNcertSum / sub.chapters.length) : 0;
    const avgPractice = sub.chapters.length ? Math.round(subPracticeSum / sub.chapters.length) : 0;

    const chapRows = sub.chapters.map((ch, ci) => {
      const done    = Math.min(doneMap[ch.id]||0, ch.totalPages||0);
      const memo    = Math.min(memoMap[ch.id]||0, ch.totalPages||0);
      const planned = Math.min(plannedMap[ch.id]||0, ch.totalPages||0);
      const cp  = calcPct(ch.totalPages, done);
      const cpm = calcPct(ch.totalPages, memo);
      const cc  = pctColor(cp);
      const ccm = pctColor(cpm);
      const totalChaps = sub.chapters.length;
      return `
        <div class="chapter-row">
          <div style="display:flex;gap:8px;align-items:flex-start;">
            <div class="reorder-btns" onclick="event.stopPropagation()">
              <button class="btn-reorder" onclick="moveChapter(${si},${ci},-1)" ${ci===0?'disabled':''}>▲</button>
              <button class="btn-reorder" onclick="moveChapter(${si},${ci},1)" ${ci===totalChaps-1?'disabled':''}>▼</button>
            </div>
            <div style="flex:1;min-width:0;">
              <div class="chapter-top">
                <span class="chapter-name">${escHtml(ch.name)}</span>
                <div style="display:flex;align-items:center;gap:6px;">
                  <span class="badge badge-${cc}">${cp}%</span>
                  <button class="del-btn" onclick="deleteSyllabusChapter(event,${si},${ci})">×</button>
                </div>
              </div>
              <div class="dual-bar-wrap">
                <div class="bar-row-label"><span>📖 Understanding</span><span>${done}/${ch.totalPages} pages</span></div>
                <div class="bar-bg"><div class="bar-fill bar-${cc}" style="width:${cp}%"></div></div>
                <div class="bar-row-label" style="margin-top:4px;"><span>🧠 Memorized</span><span>${memo}/${ch.totalPages} pages</span></div>
                <div class="bar-bg"><div class="bar-fill bar-memo" style="width:${cpm}%"></div></div>
              </div>
              <div class="practice-wrap">
                <div class="practice-row">
                  <span class="practice-icon">📝</span>
                  <span class="practice-label">NCERT</span>
                  <div class="practice-bar-wrap">
                    <div class="bar-bg"><div class="bar-fill bar-ncert" style="width:${ch.ncertPct||0}%"></div></div>
                  </div>
                  <input class="pct-input" type="number" min="0" max="100" value="${ch.ncertPct||0}"
                    onchange="updatePractice(${si},${ci},'ncertPct',this.value)"/>
                  <span style="font-size:11px;color:var(--text3);">%</span>
                </div>
                <div class="practice-row">
                  <span class="practice-icon">📚</span>
                  <span class="practice-label">Practice Book</span>
                  <div class="practice-bar-wrap">
                    <div class="bar-bg"><div class="bar-fill bar-practice" style="width:${ch.practicePct||0}%"></div></div>
                  </div>
                  <input class="pct-input" type="number" min="0" max="100" value="${ch.practicePct||0}"
                    onchange="updatePractice(${si},${ci},'practicePct',this.value)"
                    style="border-color:#fed7aa;"/>
                  <span style="font-size:11px;color:var(--text3);">%</span>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="subject-card">
        <div class="subject-header" onclick="toggleCard('${key}')">
          <div class="subject-header-main">
            <div class="subject-top">
              <span class="subject-name">${escHtml(sub.name)}</span>
              <div style="display:flex;gap:5px;align-items:center;">
                <span class="badge badge-${col}" title="Understanding">${p}%</span>
                <span class="memo-note" title="Memorized">🧠${pm}%</span>
                <div class="subject-actions" onclick="event.stopPropagation()">
                  <button class="btn-edit-sub" onclick="toggleEditSubject(${si})">✏️ Edit</button>
                  <button class="btn-del-sub" onclick="deleteSubject(event,${si})">×</button>
                </div>
              </div>
            </div>
            <div class="bar-row-label"><span>📖 Understanding</span></div>
            <div class="bar-bg"><div class="bar-fill bar-${col}" style="width:${p}%"></div></div>
            <div class="bar-row-label" style="margin-top:4px;"><span>🧠 Memorization</span></div>
            <div class="bar-bg"><div class="bar-fill bar-memo" style="width:${pm}%"></div></div>
            <div class="subject-meta">
              <span>${sub.chapters.length} chapter${sub.chapters.length!==1?'s':''}</span>
              <span>Und: ${subDone}/${subTotal} · Mem: ${subMemo}/${subTotal}</span>
            </div>
            ${avgNcert > 0 || avgPractice > 0 ? `
            <div class="sub-practice-summary">
              <span>📝 NCERT avg: <b>${avgNcert}%</b></span>
              <span>📚 Practice avg: <b>${avgPractice}%</b></span>
            </div>` : ''}
          </div>
          <span class="chevron ${isOpen?'open':''}" id="chev-${key}">›</span>
        </div>
        <div class="edit-subject-inline" id="edit-sub-${si}">
          <input type="text" id="edit-sub-input-${si}" value="${escHtml(sub.name)}" placeholder="Subject name"/>
          <button class="btn-add-chapter" onclick="saveEditSubject(${si})">Save</button>
          <button class="btn-cancel" onclick="toggleEditSubject(${si})">Cancel</button>
        </div>
        <div class="chapters-area ${isOpen?'open':''}" id="chap-${key}">
          ${chapRows || '<div style="font-size:13px;color:#94a3b8;margin-bottom:10px;">No chapters yet.</div>'}
          <div class="add-chapter-section">
            <div class="add-chapter-title">Add chapter</div>
            <div class="add-chapter-form" id="syl-ch-form-${si}">
              <input class="input-name" type="text" placeholder="Chapter name"/>
              <input class="input-pages" type="number" placeholder="Total pages" min="1"/>
              <button class="btn-add-chapter" onclick="addSyllabusChapter(event,${si})">+ Add</button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function openAddSubject() {
  document.getElementById('add-subject-form').classList.add('open');
  document.getElementById('add-subject-btn').style.display = 'none';
  document.getElementById('new-subject-name').focus();
}
function closeAddSubject() {
  document.getElementById('add-subject-form').classList.remove('open');
  document.getElementById('add-subject-btn').style.display = '';
  document.getElementById('new-subject-name').value = '';
}
function addSubject() {
  const name = document.getElementById('new-subject-name').value.trim();
  if (!name) return;
  data.subjects.push({ id: uid(), name, chapters: [] });
  save(); closeAddSubject(); renderSyllabus(); renderPlanning();
  showToast('Subject added!');
}

function addSyllabusChapter(evt, si) {
  const form = document.getElementById(`syl-ch-form-${si}`);
  const name = form.querySelector('.input-name').value.trim();
  const pages = parseInt(form.querySelector('.input-pages').value);
  if (!name || !pages || pages < 1) { showToast('Enter chapter name & pages'); return; }
  data.subjects[si].chapters.push({ id: uid(), name, totalPages: pages });
  save(); renderSyllabus(); renderPlanning();
  showToast('Chapter added!');
}

function toggleEditSubject(si) {
  const el = document.getElementById(`edit-sub-${si}`);
  el.classList.toggle('open');
  if (el.classList.contains('open')) {
    document.getElementById(`edit-sub-input-${si}`).focus();
  }
}

function saveEditSubject(si) {
  const val = document.getElementById(`edit-sub-input-${si}`).value.trim();
  if (!val) { showToast('Subject name cannot be empty'); return; }
  data.subjects[si].name = val;
  save(); renderSyllabus(); renderPlanning();
  showToast('Subject renamed!');
}

function deleteSubject(evt, si) {
  evt.stopPropagation();
  const sub = data.subjects[si];
  if (!confirm(`Delete "${sub.name}" and all its chapters from syllabus and planning?`)) return;
  // Remove all planning assignments for this subject
  MONTHS.forEach(m => {
    data.planning[m.key].assignments = data.planning[m.key].assignments.filter(a => a.subjectId !== sub.id);
  });
  data.subjects.splice(si, 1);
  save(); renderSyllabus(); renderPlanning();
  showToast('Subject deleted');
}

function deleteSyllabusChapter(evt, si, ci) {
  evt.stopPropagation();
  const chId = data.subjects[si].chapters[ci].id;
  // remove from planning too
  MONTHS.forEach(m => {
    data.planning[m.key].assignments = data.planning[m.key].assignments.filter(a => a.chapterId !== chId);
  });
  data.subjects[si].chapters.splice(ci, 1);
  save(); renderSyllabus(); renderPlanning();
  showToast('Chapter removed');
}

function updatePractice(si, ci, field, val) {
  const pct = Math.min(100, Math.max(0, parseInt(val)||0));
  data.subjects[si].chapters[ci][field] = pct;
  // Keep card open
  const key = `syl-s${si}`;
  window._openCards[key] = true;
  save(); renderSyllabus();
}

function moveChapter(si, ci, direction) {
  const chapters = data.subjects[si].chapters;
  const newIdx = ci + direction;
  if (newIdx < 0 || newIdx >= chapters.length) return;
  // Swap
  const temp = chapters[ci];
  chapters[ci] = chapters[newIdx];
  chapters[newIdx] = temp;
  // Keep the expanded card open
  const key = `syl-s${si}`;
  window._openCards[key] = true;
  save(); renderSyllabus();
  showToast(direction === -1 ? 'Chapter moved up' : 'Chapter moved down');
}

// ═══════════════════════════════════════════════════════════════════════════

function refreshChapterDropdown(monthKey) {
  const form = document.getElementById(`plan-form-${monthKey}`);
  const subSel = form.querySelector('.plan-sub-sel');
  const chSel  = form.querySelector('.plan-ch-sel');
  const subId = subSel.value;
  chSel.innerHTML = '<option value="">Chapter...</option>';
  if (!subId) return;
  const sub = data.subjects.find(s => s.id === subId);
  if (!sub) return;
  sub.chapters.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    chSel.appendChild(opt);
  });
}

function addPlanAssignment(monthKey) {
  const form = document.getElementById(`plan-form-${monthKey}`);
  if (!form) { showToast('Add subjects in Syllabus tab first'); return; }
  const subId  = form.querySelector('.plan-sub-sel').value;
  const chId   = form.querySelector('.plan-ch-sel').value;
  const pages  = parseInt(form.querySelector('.input-pages').value);
  if (!subId || !chId || !pages || pages < 1) { showToast('Pick subject, chapter & pages'); return; }

  const sub = data.subjects.find(s => s.id === subId);
  const ch  = sub?.chapters.find(c => c.id === chId);
  if (!ch) return;

  // Validate: total planned across all months cannot exceed chapter totalPages
  const alreadyPlanned = MONTHS.reduce((acc, m) => {
    return acc + (data.planning[m.key]?.assignments || [])
      .filter(a => a.chapterId === chId)
      .reduce((s, a) => s + (a.plannedPages||0), 0);
  }, 0);
  if (alreadyPlanned + pages > ch.totalPages) {
    showToast(`Only ${ch.totalPages - alreadyPlanned} pages left to plan for this chapter`);
    return;
  }

  data.planning[monthKey].assignments.push({
    id: uid(), subjectId: subId, chapterId: chId, plannedPages: pages, donePages: 0, memoPages: 0
  });
  save(); renderPlanning(); renderSyllabus();
  showToast('Chapter assigned!');
}

function updatePlanDone(monthKey, aIdx, val) {
  const a = data.planning[monthKey].assignments[aIdx];
  a.donePages = Math.min(parseInt(val)||0, a.plannedPages);
  // Memo cannot exceed coverage
  if ((a.memoPages||0) > a.donePages) a.memoPages = a.donePages;
  save(); renderPlanning(); renderSyllabus();
}

function updatePlanMemo(monthKey, aIdx, val) {
  const a = data.planning[monthKey].assignments[aIdx];
  // Memo target is plannedPages; actual cannot exceed donePages
  const entered = parseInt(val)||0;
  a.memoPages = Math.min(entered, a.donePages||0, a.plannedPages);
  save(); renderPlanning(); renderSyllabus();
}

function updatePlanTarget(monthKey, aIdx, val, chapterMax) {
  const a = data.planning[monthKey].assignments[aIdx];
  const newTarget = Math.max(1, Math.min(parseInt(val)||1, chapterMax));
  // Validate total planned across all months doesn't exceed chapter totalPages
  const chId = a.chapterId;
  const currentTotal = MONTHS.reduce((acc, m) => {
    return acc + (data.planning[m.key]?.assignments || [])
      .filter(x => x.chapterId === chId && x !== a)
      .reduce((s, x) => s + (x.plannedPages||0), 0);
  }, 0);
  if (currentTotal + newTarget > chapterMax) {
    showToast(`Total planned pages would exceed chapter total (${chapterMax})`);
    return;
  }
  a.plannedPages = newTarget;
  // Cap donePages and memoPages if they exceed new target
  if ((a.donePages||0) > newTarget) a.donePages = newTarget;
  if ((a.memoPages||0) > a.donePages) a.memoPages = a.donePages;
  save(); renderPlanning(); renderSyllabus();
}

function addCustomParam(monthKey, aIdx) {
  const name = prompt('Name for this tracker (e.g. Practice Paper, Extra Notes):');
  if (!name || !name.trim()) return;
  const a = data.planning[monthKey].assignments[aIdx];
  if (!a.customParams) a.customParams = [];
  a.customParams.push({ name: name.trim(), pct: 0 });
  save(); renderPlanning();
}

function updateCustomParam(monthKey, aIdx, cpi, val) {
  const a = data.planning[monthKey].assignments[aIdx];
  if (!a.customParams || !a.customParams[cpi]) return;
  a.customParams[cpi].pct = Math.min(100, Math.max(0, parseInt(val)||0));
  save(); renderPlanning();
}

function deleteCustomParam(monthKey, aIdx, cpi) {
  const a = data.planning[monthKey].assignments[aIdx];
  if (!a.customParams) return;
  a.customParams.splice(cpi, 1);
  save(); renderPlanning();
  showToast('Tracker removed');
}

function setConfidence(monthKey, aIdx, level) {
  const a = data.planning[monthKey].assignments[aIdx];
  // Toggle off if same button tapped again
  a.confidence = a.confidence === level ? null : level;
  save(); renderPlanning();
  const labels = { shaky: 'Marked as Shaky 🔴', ok: 'Marked as OK 🟡', confident: 'Marked as Confident 🟢' };
  showToast(a.confidence ? labels[level] : 'Rating cleared');
}

function removePlanAssignment(monthKey, aIdx) {
  data.planning[monthKey].assignments.splice(aIdx, 1);
  save(); renderPlanning(); renderSyllabus();
  showToast('Assignment removed');
}

// ═══════════════════════════════════════════════════════════════════════════
// AUTO-FILL PLANNING
// ═══════════════════════════════════════════════════════════════════════════

let _autofillPlan = null; // holds computed plan before confirm

function getRemainingMonths() {
  const now = new Date();
  const curMonth = now.getMonth() + 1; // 1-based
  return MONTHS.filter(m => m.num >= curMonth);
}

function computeAutofill() {
  const remaining = getRemainingMonths();
  if (!remaining.length) return null;
  const plan = {}; // { monthKey: [ {subjectId, chapterId, plannedPages} ] }
  remaining.forEach(m => plan[m.key] = []);

  data.subjects.forEach(sub => {
    // Use FULL totalPages for every chapter — same as Syllabus tab shows.
    // Already-done pages show as progress within the full target.
    // Only skip chapters that are fully planned already across all months.
    const chapQueue = [];
    sub.chapters.forEach(ch => {
      if ((ch.totalPages||0) > 0) {
        chapQueue.push({ id: ch.id, name: ch.name, pages: ch.totalPages });
      }
    });

    const totalPages = chapQueue.reduce((a,c) => a + c.pages, 0);
    if (!totalPages) return;

    // Distribute full totalPages evenly across months
    const numMonths = remaining.length;
    const basePages = Math.floor(totalPages / numMonths);
    const extraPages = totalPages % numMonths; // first N months get 1 extra page

    // Build month budgets
    const budgets = remaining.map((m, i) => ({
      key: m.key,
      budget: basePages + (i < extraPages ? 1 : 0)
    }));

    // Fill months top-to-bottom through chapQueue.
    // A chapter's full pages must be assigned before moving to the next.
    let chapIdx = 0;
    let leftInCurrentChap = chapQueue[0]?.pages || 0;

    budgets.forEach(mb => {
      let budget = mb.budget;
      while (budget > 0 && chapIdx < chapQueue.length) {
        const ch = chapQueue[chapIdx];
        const take = Math.min(budget, leftInCurrentChap);
        if (take > 0) {
          const existing = plan[mb.key].find(e => e.chapterId === ch.id);
          if (existing) {
            existing.plannedPages += take;
          } else {
            plan[mb.key].push({ subjectId: sub.id, chapterId: ch.id, plannedPages: take });
          }
        }
        budget -= take;
        leftInCurrentChap -= take;
        if (leftInCurrentChap <= 0) {
          chapIdx++;
          leftInCurrentChap = chapQueue[chapIdx]?.pages || 0;
        }
      }
    });
  });

  return { plan, remaining };
}

function previewAutofill() {
  if (!data.subjects.length) { showToast('Add subjects & chapters in Syllabus first'); return; }
  const result = computeAutofill();
  if (!result) { showToast('No remaining months to fill'); return; }
  _autofillPlan = result;

  const { plan, remaining } = result;
  const sub = document.getElementById('autofill-modal-sub');
  sub.textContent = `This will clear existing planning and fill ${remaining.length} month${remaining.length!==1?'s':''} (${remaining[0].label} → ${remaining[remaining.length-1].label}) based on remaining syllabus pages.`;

  // Build preview HTML — show per month, per chapter detail
  const doneMapPrev = chapterDoneMap();
  const previewEl = document.getElementById('autofill-preview');
  let html = '';
  data.subjects.forEach(s => {
    let subHtml = '';
    remaining.forEach(m => {
      const entries = (plan[m.key]||[]).filter(e => e.subjectId === s.id);
      if (!entries.length) return;
      const chLines = entries.map(e => {
        const ch = s.chapters.find(c => c.id === e.chapterId);
        if (!ch) return '';
        const alreadyDone = Math.min(doneMapPrev[ch.id]||0, ch.totalPages);
        return `<div style="font-size:11px;color:var(--text2);padding:1px 0 1px 8px;">
          ${escHtml(ch.name)}: ${e.plannedPages} pages
          ${alreadyDone > 0 ? `<span style="color:#22c55e;">(${alreadyDone} pages already done ✓)</span>` : ''}
        </div>`;
      }).join('');
      const totalPages = entries.reduce((a,e) => a+e.plannedPages, 0);
      subHtml += `<div class="preview-month-row" style="flex-direction:column;align-items:flex-start;">
        <div style="display:flex;justify-content:space-between;width:100%;"><b>${m.label}</b><span>${totalPages} pages</span></div>
        ${chLines}
      </div>`;
    });
    if (!subHtml) return;
    html += `<div class="preview-subject">
      <div class="preview-subject-name">${escHtml(s.name)}</div>
      ${subHtml}
    </div>`;
  });
  previewEl.innerHTML = html || '<div style="color:var(--text3);font-size:13px;">Nothing to distribute — all pages already covered!</div>';
  document.getElementById('autofill-modal').classList.add('show');
}

function closeAutofill() {
  document.getElementById('autofill-modal').classList.remove('show');
  _autofillPlan = null;
}

function confirmAutofill() {
  if (!_autofillPlan) return;
  const { plan, remaining } = _autofillPlan;

  // Build a lookup of existing progress keyed by monthKey+chapterId
  // so we can preserve donePages and memoPages after re-planning
  const progressMap = {};
  remaining.forEach(m => {
    (data.planning[m.key]?.assignments || []).forEach(a => {
      const key = `${m.key}__${a.chapterId}`;
      if (!progressMap[key]) progressMap[key] = { donePages: 0, memoPages: 0 };
      progressMap[key].donePages += (a.donePages || 0);
      progressMap[key].memoPages += (a.memoPages || 0);
    });
  });

  // Clear planning for remaining months only
  remaining.forEach(m => {
    data.planning[m.key] = { assignments: [] };
  });

  // Write new assignments, restoring progress where it exists.
  // Now plannedPages = full chapter pages, so progress fits naturally.
  remaining.forEach(m => {
    (plan[m.key]||[]).forEach(entry => {
      const pKey = `${m.key}__${entry.chapterId}`;
      const prev = progressMap[pKey] || { donePages: 0, memoPages: 0 };
      const donePages = Math.min(prev.donePages, entry.plannedPages);
      const memoPages = Math.min(prev.memoPages, donePages);
      data.planning[m.key].assignments.push({
        id: uid(),
        subjectId: entry.subjectId,
        chapterId: entry.chapterId,
        plannedPages: entry.plannedPages,
        donePages,
        memoPages
      });
    });
  });

  save(); renderPlanning(); renderSyllabus();
  closeAutofill();
  showToast('Planning updated — progress preserved!');
}

              <span class="chapter-name">${escHtml(ch.name)}</span>
              <div style="display:flex;align-items:center;gap:6px;">
                <span class="badge badge-${cc}">${cp}%</span>
                <button class="del-btn" onclick="deleteExamChapter(event,${ei},${si},${ci})">×</button>
              </div>
            </div>
            <div class="chapter-progress-row">
              <div class="bar-bg"><div class="bar-fill bar-${cc}" style="width:${cp}%"></div></div>
              <input class="pages-input" type="number" min="0" max="${ch.totalPages}" value="${ch.donePages||0}"
                onchange="updateExamPages(${ei},${si},${ci},this.value)"/>
              <span class="pages-of">/ ${ch.totalPages}</span>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="subject-card" style="box-shadow:none;margin-bottom:8px;">
          <div class="subject-header" onclick="toggleCard('${subKey}')">
            <div class="subject-header-main">
              <div class="subject-top">
                <span class="subject-name" style="font-size:14px;">${escHtml(sub.name)}</span>
                <span class="badge badge-${sc}">${sp}%</span>
              </div>
              <div class="bar-bg"><div class="bar-fill bar-${sc}" style="width:${sp}%"></div></div>
              <div class="subject-meta"><span>${sub.chapters.length} chapters</span><span>${sd}/${st} pages</span></div>
            </div>
            <span class="chevron ${isSubOpen?'open':''}" id="chev-${subKey}">›</span>
          </div>
          <div class="chapters-area ${isSubOpen?'open':''}" id="chap-${subKey}">
            ${chapRows || '<div style="font-size:13px;color:#94a3b8;margin-bottom:10px;">No chapters yet.</div>'}
            <div class="add-chapter-section">
              <div class="add-chapter-title">Add chapter</div>
              <div class="add-chapter-form" id="exam-ch-form-${ei}-${si}">
                <input class="input-name" type="text" placeholder="Chapter name"/>
                <input class="input-pages" type="number" placeholder="Pages" min="1"/>
                <button class="btn-add-chapter" onclick="addExamChapter(event,${ei},${si})">+ Add</button>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="exam-card">
        <div class="exam-header" onclick="toggleCard('${key}')">
          <div class="exam-top">
            <span class="exam-name">${escHtml(exam.name)}</span>
            <span class="badge badge-${col}">${p}%</span>
          </div>
          <div class="bar-bg"><div class="bar-fill bar-${col}" style="width:${p}%"></div></div>
          <div class="exam-meta">
            <span>${exam.subjects.length} subject${exam.subjects.length!==1?'s':''}</span>
            <span>${done} / ${total} pages</span>
          </div>
        </div>
        <div class="chapters-area ${isOpen?'open':''}" id="chap-${key}">
          <div class="section-title" style="margin-top:0;">Subjects</div>
          ${subsHtml || '<div style="font-size:13px;color:#94a3b8;margin-bottom:10px;">No subjects yet.</div>'}
          <div class="add-chapter-section" id="add-exam-sub-form-${ei}" style="display:none;">
            <div class="add-chapter-title">Add subject</div>
            <div class="add-chapter-form">
              <input class="input-name" type="text" placeholder="Subject name"/>
              <button class="btn-add-chapter" onclick="addExamSubject(event,${ei})">+ Add</button>
            </div>
          </div>
          <button class="add-card-btn" style="margin-top:8px;" onclick="toggleEl('add-exam-sub-form-${ei}')">+ Add subject</button>
          <button class="del-btn" style="display:block;margin-top:10px;font-size:13px;color:#94a3b8;" onclick="deleteExam(${ei})">Remove exam</button>
        </div>
      </div>`;
  }).join('');
}

function addExamSubject(evt, ei) {
  const form = document.getElementById(`add-exam-sub-form-${ei}`);
  const name = form.querySelector('.input-name').value.trim();
  if (!name) return;
  data.exams[ei].subjects.push({ id: uid(), name, chapters: [] });
  save(); renderExams(); showToast('Subject added!');
}
function addExamChapter(evt, ei, si) {
  const form = document.getElementById(`exam-ch-form-${ei}-${si}`);
  const name = form.querySelector('.input-name').value.trim();
  const pages = parseInt(form.querySelector('.input-pages').value);
  if (!name || !pages || pages < 1) { showToast('Enter name & pages'); return; }
  data.exams[ei].subjects[si].chapters.push({ id: uid(), name, totalPages: pages, donePages: 0 });
  save(); renderExams(); showToast('Chapter added!');
}
function updateExamPages(ei, si, ci, val) {
  const ch = data.exams[ei].subjects[si].chapters[ci];
  ch.donePages = Math.min(parseInt(val)||0, ch.totalPages);
  save(); renderExams();
}
function deleteExamChapter(evt, ei, si, ci) {
  evt.stopPropagation();
  data.exams[ei].subjects[si].chapters.splice(ci, 1);
  save(); renderExams(); showToast('Chapter removed');
}
function deleteExam(ei) {
  if (!confirm('Remove this exam?')) return;
  data.exams.splice(ei, 1);
  save(); renderExams(); showToast('Exam removed');
}

function openAddExam() {
  document.getElementById('add-exam-form').classList.add('open');
  document.getElementById('add-exam-btn').style.display = 'none';
  document.getElementById('new-exam-name').focus();
}
function closeAddExam() {
  document.getElementById('add-exam-form').classList.remove('open');
  document.getElementById('add-exam-btn').style.display = '';
  document.getElementById('new-exam-name').value = '';
}
function addExam() {
  const name = document.getElementById('new-exam-name').value.trim();
  if (!name) return;
  data.exams.push({ id: uid(), name, subjects: [] });
  save(); closeAddExam(); renderExams(); showToast('Exam added!');
}

function toggleEl(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────
function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `studytracker-backup-${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported successfully!');
}

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      // Basic validation
      if (typeof imported !== 'object' || !imported.subjects || !imported.planning) {
        showToast('Invalid backup file'); return;
      }
      if (!confirm('This will replace all current data with the backup. Continue?')) return;
      data = imported;
      // Ensure all months exist
      MONTHS.forEach(m => {
        if (!data.planning[m.key]) data.planning[m.key] = { assignments: [] };
      });
      save();
      renderSyllabus();
      renderPlanning();
      renderExams();
      renderDeadlineCard();
      showToast('Data imported successfully!');
    } catch(err) {
      showToast('Could not read file');
    }
    // Reset input so same file can be re-imported if needed
    evt.target.value = '';
  };
  reader.readAsText(file);
}

// ── PWA ───────────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', () => {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
  document.getElementById('installBanner').classList.remove('show');
});
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}

// ── INIT ──────────────────────────────────────────────────────────────────
load();
renderSyllabus();
renderPlanning();
renderExams();
renderDeadlineCard();

document.getElementById('new-subject-name').addEventListener('keydown', e => { if(e.key==='Enter') addSubject(); });
document.getElementById('new-exam-name').addEventListener('keydown', e => { if(e.key==='Enter') addExam(); });
</script>
</body>
